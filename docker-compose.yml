name: ${COMPOSE_PROJECT_NAME:-fliegerlager}

services:
  storage-migrate:
    image: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
    user: "0:0"
    restart: "no"
    entrypoint: ["python", "-m", "config.persistence_migration"]
    command: []
    environment:
      PERSISTENCE_ROOT: /data
      POSTGRES_MAJOR: "16"
    volumes:
      - ${PERSISTENCE_DIR:-./data}:/data
      - postgres_data:/legacy/postgres:ro
      - media_data:/legacy/media:ro
      - updater_state:/legacy/updater-state:ro
      - ${BACKUP_DIR:-./backups}:/legacy/backups:ro

  app:
    image: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
    env_file: .env
    restart: unless-stopped
    environment:
      BACKUP_DIR: /backups
      WEB_PUSH_KEY_DIR: /run/secrets/webpush
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8000}:8000"
    depends_on:
      storage-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    labels:
      io.lsf-fliegerlager.update-target: "true"
    volumes:
      - ${PERSISTENCE_DIR:-./data}/media:/app/src/media
      - ${PERSISTENCE_DIR:-./data}/backups:/backups
      - ${PERSISTENCE_DIR:-./data}/secrets/webpush:/run/secrets/webpush
    networks:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fliegerlager}
      POSTGRES_USER: ${POSTGRES_USER:-fliegerlager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    depends_on:
      storage-migrate:
        condition: service_completed_successfully
    volumes:
      - ${PERSISTENCE_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ${PERSISTENCE_DIR:-./data}/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  updater:
    image: ${UPDATER_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp-updater:latest}
    restart: unless-stopped
    environment:
      UPDATE_AGENT_TOKEN: ${UPDATE_AGENT_TOKEN:?UPDATE_AGENT_TOKEN must be set in .env}
      APP_IMAGE: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      PORTAINER_URL: ${PORTAINER_URL:?PORTAINER_URL must be set in .env}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY:?PORTAINER_API_KEY must be set in .env}
      PORTAINER_ENDPOINT_ID: ${PORTAINER_ENDPOINT_ID:?PORTAINER_ENDPOINT_ID must be set in .env}
      PORTAINER_STACK_ID: ${PORTAINER_STACK_ID:?PORTAINER_STACK_ID must be set in .env}
      APP_HEALTH_URL: ${APP_HEALTH_URL:-http://app:8000/healthz/}
      TARGET_SERVICE: ${TARGET_SERVICE:-app}
      GHCR_TOKEN: ${GHCR_TOKEN:-}
      UPDATE_HEALTH_TIMEOUT: ${UPDATE_HEALTH_TIMEOUT:-180}
      BACKUP_DIR: /backups
      TZ: ${TZ:-Europe/Berlin}
      PORTAINER_VERIFY_SSL: ${PORTAINER_VERIFY_SSL:-true}
    depends_on:
      storage-migrate:
        condition: service_completed_successfully
    volumes:
      - ${PERSISTENCE_DIR:-./data}/backups:/backups
      - ${PERSISTENCE_DIR:-./data}/updater-state:/state
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; request=urllib.request.Request('http://127.0.0.1:8080/healthz', headers={'Authorization': 'Bearer ' + os.environ['UPDATE_AGENT_TOKEN']}); urllib.request.urlopen(request, timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - frontend
      - backend

  daily-settlement-backup:
    image: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
    env_file: .env
    restart: unless-stopped
    environment:
      BACKUP_DIR: /backups
      WEB_PUSH_KEY_DIR: /run/secrets/webpush
    command: ["python", "manage.py", "run_daily_settlement_backup", "--loop"]
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
      updater:
        condition: service_healthy
    volumes:
      - ${PERSISTENCE_DIR:-./data}/media:/app/src/media
      - ${PERSISTENCE_DIR:-./data}/backups:/backups
      - ${PERSISTENCE_DIR:-./data}/secrets/webpush:/run/secrets/webpush:ro
    networks:
      - backend

  push-worker:
    image: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
    env_file: .env
    restart: unless-stopped
    environment:
      WEB_PUSH_KEY_DIR: /run/secrets/webpush
    command: ["python", "manage.py", "run_push_worker", "--loop"]
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      - ${PERSISTENCE_DIR:-./data}/secrets/webpush:/run/secrets/webpush:ro
    networks:
      - frontend
      - backend

  email-worker:
    image: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
    env_file: .env
    restart: unless-stopped
    command: ["python", "manage.py", "run_email_worker", "--loop"]
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - frontend
      - backend

volumes:
  media_data:
  postgres_data:
  updater_state:

networks:
  frontend:
  backend:
    internal: true
