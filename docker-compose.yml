name: ${COMPOSE_PROJECT_NAME:-fliegerlager}

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
    env_file: .env
    restart: unless-stopped
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    labels:
      io.lsf-fliegerlager.update-target: "true"
    volumes:
      - media_data:/app/src/media
    networks:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fliegerlager}
      POSTGRES_USER: ${POSTGRES_USER:-fliegerlager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${BACKUP_DIR:-./backups}:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  updater:
    image: ${UPDATER_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp-updater:latest}
    restart: unless-stopped
    environment:
      UPDATE_AGENT_TOKEN: ${UPDATE_AGENT_TOKEN:?UPDATE_AGENT_TOKEN must be set in .env}
      APP_IMAGE: ${APP_IMAGE:-ghcr.io/lsf-wesel-rheinhausen/lsf-fliegerlager-webapp:latest}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      PORTAINER_URL: ${PORTAINER_URL:?PORTAINER_URL must be set in .env}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY:?PORTAINER_API_KEY must be set in .env}
      PORTAINER_ENDPOINT_ID: ${PORTAINER_ENDPOINT_ID:?PORTAINER_ENDPOINT_ID must be set in .env}
      PORTAINER_STACK_ID: ${PORTAINER_STACK_ID:?PORTAINER_STACK_ID must be set in .env}
      APP_HEALTH_URL: ${APP_HEALTH_URL:-http://app:8000/healthz/}
      GHCR_TOKEN: ${GHCR_TOKEN:-}
      UPDATE_HEALTH_TIMEOUT: ${UPDATE_HEALTH_TIMEOUT:-180}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
      - updater_state:/state
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; request=urllib.request.Request('http://127.0.0.1:8080/healthz', headers={'Authorization': 'Bearer ' + os.environ['UPDATE_AGENT_TOKEN']}); urllib.request.urlopen(request, timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - frontend
      - backend

volumes:
  media_data:
  postgres_data:
  updater_state:

networks:
  frontend:
  backend:
    internal: true
