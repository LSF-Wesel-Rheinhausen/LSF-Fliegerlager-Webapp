[tool.ruff]
target-version = "py313"
line-length = 120
src = ["src", "tests"]
extend-exclude = ["src/billing/migrations"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "DJ",
]
ignore = [
  "DJ001",
  "DJ012",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.13"
files = ["src"]
plugins = ["mypy_django_plugin.main"]
mypy_path = "src"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
no_implicit_optional = true

[tool.django-stubs]
django_settings_module = "config.settings"

[tool.coverage.run]
source = ["src/billing"]
branch = true
omit = [
    "src/billing/migrations/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "pass",
    "\\.\\.\\."
]
