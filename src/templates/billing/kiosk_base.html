{% load static %}
<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kiosk{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'billing/app.css' %}">
  </head>
  <body class="kiosk-shell">
    <header class="topbar kiosk-topbar">
      <a class="brand" href="{% url 'kiosk-login' %}">
        <img src="{% static 'billing/logo.jpg' %}" alt="Luftsportfreunde Wesel-Rheinhausen e.V.">
        <span>Kiosk</span>
      </a>
      <nav class="kiosk-nav">
        {% block kiosk_nav %}{% endblock %}
      </nav>
    </header>
    <main class="page kiosk-page">
      {% for message in messages %}
        <section class="message {{ message.tags }}" role="status">{{ message }}</section>
      {% endfor %}
      {% block content %}{% endblock %}
    </main>
    {% if kiosk_autologout %}
      <script>
        (() => {
          const logoutUrl = "{% url 'kiosk-logout' %}";
          const timeoutMs = 2 * 60 * 1000;
          let timeoutId;

          const resetTimeout = () => {
            window.clearTimeout(timeoutId);
            timeoutId = window.setTimeout(() => {
              window.location.href = logoutUrl;
            }, timeoutMs);
          };

          ["pointerdown", "keydown", "touchstart", "mousemove", "scroll"].forEach((eventName) => {
            window.addEventListener(eventName, resetTimeout, { passive: true });
          });
          document.addEventListener("visibilitychange", () => {
            if (!document.hidden) {
              resetTimeout();
            }
          });
          resetTimeout();
        })();
      </script>
    {% endif %}
    {% block scripts %}{% endblock %}
  </body>
</html>
