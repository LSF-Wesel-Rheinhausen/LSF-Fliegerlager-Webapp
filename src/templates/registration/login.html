{% extends "base.html" %}
{% block title %}Anmelden{% endblock %}
{% block content %}
  <section class="panel narrow">
    <h1>Anmelden</h1>
    <form method="post" class="stack">
      {% csrf_token %}
      <p class="hint">Anmeldung mit E-Mail-Adresse oder Benutzername.</p>
      {{ form.as_p }}
      <div class="form-actions">
        <a class="button button-secondary" href="{% url 'kiosk-login' %}">Zurück zum Kiosk</a>
        <button type="submit" class="button">Anmelden</button>
      </div>
    </form>
  </section>
{% endblock %}
