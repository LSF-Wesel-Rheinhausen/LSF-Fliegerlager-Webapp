name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Quality and browser tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Build Docker image
        run: docker build -t lsf-webapp:latest .

      - name: Test Docker image
        run: docker run --rm lsf-webapp:latest python manage.py check

      - name: Log in to the Container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          # Convert repository name to lowercase (Docker requirement)
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')

          docker tag lsf-webapp:latest $IMAGE_ID:latest
          docker tag lsf-webapp:latest $IMAGE_ID:${{ github.sha }}

          docker push $IMAGE_ID:latest
          docker push $IMAGE_ID:${{ github.sha }}
