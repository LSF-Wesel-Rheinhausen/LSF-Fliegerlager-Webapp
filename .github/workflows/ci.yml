name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and browser tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5


      - name: Build Docker image
        run: docker build -t lsf-webapp:latest .

      - name: Test Docker image
        run: docker run --rm lsf-webapp:latest python manage.py check
