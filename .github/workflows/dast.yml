name: DAST ZAP Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: OWASP ZAP Baseline Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Start Application
        run: |
          # Build test image
          docker build -t lsf-webapp:test .
          # Run the production entrypoint so ZAP scans Gunicorn and WhiteNoise, not Django's dev static handler.
          docker run -d \
            -p 8000:8000 \
            --name lsf-webapp \
            -e DJANGO_DEBUG=0 \
            -e DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1 \
            -e DJANGO_SECRET_KEY=test-only-zap-secret-with-more-than-fifty-characters-1234567890 \
            lsf-webapp:test
          # Wait for the server to be ready
          sleep 10

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          artifact_name: 'zap-scan'
          cmd_options: '-a'
